[workspace]
resolver = "2"
members = [
    "aura-identity",
    "aura-reputation",
    "aura-token",
    "aura-meeting-factory",
    "aura-permissions",
]

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true
