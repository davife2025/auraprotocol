services:
  # ── API ─────────────────────────────────────────────────────────────────────
  - type: web
    name: aura-protocol-api
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/your-org/aura-protocol
    branch: main
    buildCommand: pnpm install && pnpm --filter @aura/db generate && pnpm --filter @aura/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key:   NODE_ENV
        value: production
      - key:   DATABASE_URL
        fromDatabase:
          name: aura-protocol-db
          property: connectionString
      - key:   REDIS_HOST
        fromService:
          name: aura-protocol-redis
          type: redis
          property: host
      - key:   REDIS_PORT
        fromService:
          name: aura-protocol-redis
          type: redis
          property: port
      # Add these manually in Render dashboard (secrets):
      - key: STELLAR_NETWORK
      - key: STELLAR_RPC_URL
      - key: STELLAR_NETWORK_PASSPHRASE
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: STELLAR_IDENTITY_CONTRACT
      - key: STELLAR_REPUTATION_CONTRACT
      - key: STELLAR_PERMISSIONS_CONTRACT
      - key: STELLAR_MEETING_FACTORY_CONTRACT
      - key: STELLAR_TOKEN_CONTRACT
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── Agent Runner ─────────────────────────────────────────────────────────────
  - type: worker
    name: aura-protocol-agent-runner
    runtime: node
    plan: starter
    region: oregon
    repo: https://github.com/your-org/aura-protocol
    branch: main
    buildCommand: pnpm install && pnpm --filter @aura/agent-core build && pnpm --filter @aura/agent-runner build
    startCommand: node apps/agent-runner/dist/index.js
    envVars:
      - key:   NODE_ENV
        value: production
      - key:   REDIS_HOST
        fromService:
          name: aura-protocol-redis
          type: redis
          property: host
      - key:   REDIS_PORT
        fromService:
          name: aura-protocol-redis
          type: redis
          property: port
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STELLAR_NETWORK
      - key: STELLAR_SECRET_KEY
        sync: false

databases:
  - name: aura-protocol-db
    plan: starter
    databaseName: aura_prod
    user: aura

  - name: aura-protocol-redis
    type: redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
